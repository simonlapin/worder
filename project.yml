name: Worder
options:
  bundleIdPrefix: dev.lsa
  deploymentTarget:
    iOS: "26.0"
packages:
  WorderCore:
    path: WorderCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  Worder:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: WorderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lsa.worder
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  WorderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AppTests
    dependencies:
      - target: Worder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Worder:
    build:
      targets:
        Worder: all
    test:
      targets:
        - WorderTests
