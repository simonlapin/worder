name: Worder
options:
  bundleIdPrefix: dev.lsa
  deploymentTarget:
    iOS: "26.0"
packages:
  WorderCore:
    path: WorderCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7427PD678R
targets:
  Worder:
    type: application
    platform: iOS
    sources:
      - App
      - path: data/core-1500.json
        buildPhase: resources
    dependencies:
      - package: WorderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lsa.worder
        GENERATE_INFOPLIST_FILE: YES
        # Merged into the generated Info.plist (export compliance, display name).
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
  WorderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AppTests
    dependencies:
      - target: Worder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Worder:
    build:
      targets:
        Worder: all
    test:
      targets:
        - WorderTests
